<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #0d1117 0%, #161b27 40%, #0d1f3c 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: white;
    padding: 20px;
  }
  h1 {
    font-size: 2.2em; font-weight: 900; margin-bottom: 14px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 20px rgba(139,92,246,0.4));
  }
  #hud { display: flex; gap: 12px; margin-bottom: 14px; }
  #hud span {
    background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.25);
    padding: 8px 18px; border-radius: 12px; font-weight: 700; font-size: 0.95em; color: rgba(255,255,255,0.85);
  }
  #grid { display: grid; gap: 10px; margin-bottom: 14px; }
  .card {
    width: 72px; height: 72px; border-radius: 12px; cursor: pointer; perspective: 700px;
    transition: transform 0.12s; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.3));
  }
  .card:hover:not(.flipped):not(.matched) { transform: scale(1.08) translateY(-2px); }
  .card-inner {
    width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); border-radius: 12px;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }
  .card-front {
    background: linear-gradient(145deg, #1e2a4a, #2d3f6e);
    border: 2px solid rgba(96,165,250,0.25); font-size: 1.6em; color: rgba(96,165,250,0.3);
  }
  .card-back {
    background: linear-gradient(145deg, #1e2a4a, #2d3b6b);
    border: 2px solid rgba(96,165,250,0.4); transform: rotateY(180deg); font-size: 2.2em;
  }
  .card.matched .card-back {
    background: linear-gradient(145deg, #1a3a2a, #1e5c3a);
    border-color: rgba(52,211,153,0.5);
    animation: matchPop 0.4s cubic-bezier(0.2,1.6,0.5,1);
  }
  @keyframes matchPop { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.18)} 100%{transform:rotateY(180deg) scale(1)} }
  .controls-row { display: flex; align-items: center; gap: 10px; }
  button {
    padding: 10px 24px; font-size: 0.95em; font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #7c3aed, #2563eb); border: none;
    color: white; border-radius: 10px; cursor: pointer; font-weight: 800;
    box-shadow: 0 4px 15px rgba(124,58,237,0.35); transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.45); }
  select {
    padding: 9px 14px; font-size: 0.95em; font-family: 'Nunito', sans-serif;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
    color: white; border-radius: 10px; cursor: pointer; font-weight: 700;
  }
  #result {
    font-size: 1.2em; font-weight: 800; margin-bottom: 10px; min-height: 32px;
    color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.4);
  }
</style>
</head>
<body>
<h1>🎴 MEMORY MATCH</h1>
<div id="hud">
  <span>手数: <span id="moves">0</span></span>
  <span>マッチ: <span id="matched">0</span>/<span id="total">0</span></span>
  <span>タイム: <span id="timer">0</span>s</span>
</div>
<div id="result"></div>
<div>
  <select id="difficulty" onchange="newGame()">
    <option value="4">かんたん (4×4)</option>
    <option value="5" selected>ふつう (5×4)</option>
    <option value="6">むずかしい (6×5)</option>
  </select>
  <button onclick="newGame()">新しいゲーム</button>
</div>
<br>
<div id="grid"></div>

<script>
const EMOJIS = ['🎮','🎯','🎲','🎪','🎭','🎨','🎬','🎸','🎺','🎻','🎹','🥁',
                '🎤','🎧','🎵','🎶','🏆','🎖','🥇','🏅','🎁','🎀','🎊','🎉',
                '🌟','⭐','💫','✨','🌈','🌙','☀️','🌺'];

let cards = [], flipped = [], matched = 0, moves = 0;
let timerInterval, startTime, canFlip = true;

function newGame() {
  const diff = parseInt(document.getElementById('difficulty').value);
  const cols = diff, rows = diff === 4 ? 4 : diff === 5 ? 4 : 5;
  const total = cols * rows;
  const pairs = total / 2;

  clearInterval(timerInterval);
  moves = 0; matched = 0; flipped = []; canFlip = true;
  document.getElementById('moves').textContent = 0;
  document.getElementById('matched').textContent = 0;
  document.getElementById('total').textContent = pairs;
  document.getElementById('timer').textContent = 0;
  document.getElementById('result').textContent = '';

  const emojis = EMOJIS.slice(0, pairs);
  const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 70px)`;
  grid.innerHTML = '';
  cards = [];

  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">?</div>
        <div class="card-back">${emoji}</div>
      </div>`;
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
    cards.push(card);
  });

  // Brief peek at start
  cards.forEach(c => c.classList.add('flipped'));
  setTimeout(() => {
    cards.forEach(c => c.classList.remove('flipped'));
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = elapsed;
    }, 1000);
  }, 1200);
}

function flipCard(card) {
  if (!canFlip) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    canFlip = false;

    if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
      flipped.forEach(c => {
        c.classList.add('matched');
        c.style.pointerEvents = 'none';
      });
      matched++;
      document.getElementById('matched').textContent = matched;
      flipped = [];
      canFlip = true;

      const totalPairs = cards.length / 2;
      if (matched === totalPairs) {
        clearInterval(timerInterval);
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('result').textContent =
          `🎉 クリア！ ${moves}手 / ${elapsed}秒`;
      }
    } else {
      setTimeout(() => {
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = [];
        canFlip = true;
      }, 900);
    }
  }
}

newGame();
</script>
</body>
</html>
